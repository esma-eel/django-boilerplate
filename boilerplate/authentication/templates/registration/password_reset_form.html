{% extends "authentication/base.html" %}
{% load static %}
{% block title %}Reset Password Form{% endblock title %}

{% block content %}
<form action="." method="POST">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
        <input type="{{field.field.widget.input_type}}" name="{{ field.name }}" class="" id="{{ field.auto_id }}" placeholder="{% if field.label == 'ایمیل' %}پست الکترونیک{% endif %}" required>
    </div>
    {% endfor %}
    <button type="submit" class="">Reset</button>
    <input type="hidden" name="next" value="{{ next }}">
</form>
{% endblock content %}
