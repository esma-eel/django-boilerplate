{% extends "authentication/base.html" %}
{% block title %}Password Reset Form{% endblock title %}

{% block content %}
{% if validlink %}
<form action="." method="POST">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
        <input type="{{field.field.widget.input_type}}" name="{{ field.name }}" class="" id="{{ field.auto_id }}" placeholder="{{field.label}}" required>
    </div>
    {% endfor %}
    <button type="submit" class="">Submit</button>
    <input type="hidden" name="next" value="{{ next }}">
</form>
{% else %}
<h1>Wrong Link</h1>
{% endif %}
{% endblock content %}
