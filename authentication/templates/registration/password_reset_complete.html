{% extends "authentication/base.html" %}
{% block title %}Reset Password Complete{% endblock title %}

{% block content %}
<div class="flex flex-col justify-center items-center h-screen">
    <div class="">
        <h1 class="text-center text-2xl font-bold text-teal-600 sm:text-3xl">Reset password complete</h1>
        <p class="mx-auto mt-4 max-w-md text-center text-gray-500">
            Congrats! your password reset process completed.
            you can login now
        </p>
        <div class="text-center mt-4">
            <a
                href="{% url "authentication:login" %}"
                class="rounded-lg bg-teal-600 px-5 py-3 text-sm font-medium text-white"
            >
                Login
            </a>
        </div>
    </div>
</div>
{% endblock content %}
